# Notebook Crew Configuration
# This crew handles Quarto notebook generation for UNHCR data stories

name: notebook_crew

# Crew-level settings
process_type: sequential
verbose: 2
memory: true
cache: true
max_rpm: null
share_crew: true
crew_name: "NotebookCrew_{audience}_{document_type}"
manager_llm: null

description: |
  Crew responsible for generating Quarto notebooks from data stories.
  This crew coordinates the creation of reproducible, well-formatted
  notebooks that can be rendered to HTML and PDF.

# Agent references
agents:
  - notebook_generator
  - story_generator
  - visualization_expert

# Default workflow for this crew
workflow:
  - name: generate_story
    description: Generate story content from data and analysis
    agent: story_generator
    expected_output: Story content with metadata
    context:
      - data
      - analysis
      - question
      - audience
      - document_type
    async_execution: true
    
  - name: extract_visualization
    description: Extract visualization structure from data
    agent: visualization_expert
    expected_output: Visualization structure and metadata
    context:
      - data
      - analysis
      - question
      - audience
      - document_type
    depends_on: generate_story
    async_execution: false
    
  - name: create_quarto_notebook
    description: Create Quarto notebook from story content
    agent: notebook_generator
    expected_output: Complete Quarto notebook (.qmd file)
    context:
      - story_content
      - data
      - analysis
      - visualization_structure
      - question
      - audience
      - document_type
      - output_path
    depends_on: extract_visualization
    async_execution: false

# Alternative workflows
alternative_workflows:
  story_only:
    - name: generate_story
      description: Generate story without notebook
      agent: story_generator
      expected_output: Story content
      context:
        - data
        - analysis
        - question
        - audience
        - document_type
    
  notebook_from_story:
    - name: create_quarto_notebook
      description: Create notebook from existing story content
      agent: notebook_generator
      expected_output: Quarto notebook
      context:
        - story_content
        - audience
        - document_type
        - output_path

# Crew-specific configuration
notebook_settings:
  default_template: quarto_notebook_interleaved.j2
  include_code_cells: true
  use_unhcr_theme: true
  use_unhcr_style: true
  default_output_format: [html, pdf]
