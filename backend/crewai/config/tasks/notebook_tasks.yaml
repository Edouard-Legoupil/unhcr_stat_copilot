# UNHCR Statistics Copilot - Notebook Task Definitions
# This file defines notebook-related tasks using YAML for improved readability

tasks:
  # Create Notebook Task
  - name: create_notebook
    description: |
      Create a Quarto notebook from analysis results.
      This task uses the NotebookGenerator agent to generate
      a complete Quarto notebook (.qmd file) from story content,
      data, and analysis results.
    
    agent: notebook_generator
    expected_output: |
      A dictionary containing the notebook:
      {
        'status': str,
        'notebook_content': str,
        'metadata': dict,
        'path': str
      }
    
    context:
      - story_content
      - data
      - analysis
      - question
      - output_path
      - audience
      - document_type
    
    async_execution: false
    
    parameters:
      - name: story_content
        type: str
        required: false
        default: ""
        description: The story/narrative content
      - name: data
        type: dict
        required: false
        default: {}
        description: Data used in analysis
      - name: analysis
        type: dict
        required: false
        default: {}
        description: Analysis results
      - name: question
        type: str
        required: false
        default: ""
        description: Original question
      - name: output_path
        type: str
        required: false
        default: null
        description: Output file path
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Create Quarto Notebook Task (MCP compatible)
  - name: create_quarto_notebook
    description: |
      Create a Quarto notebook using MCP tools.
      This task generates a Quarto notebook (.qmd file) with proper
      YAML metadata, UNHCR styling, and optional code cells.
    
    agent: notebook_generator
    expected_output: |
      A dictionary containing the Quarto notebook:
      {
        'status': str,
        'content': str,
        'path': str,
        'metadata': dict
      }
    
    context:
      - story_content
      - audience
      - document_type
      - output_path
    
    async_execution: false
    
    parameters:
      - name: story_content
        type: str
        required: false
        default: ""
        description: The story content for the notebook
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
      - name: output_path
        type: str
        required: false
        default: null
        description: Output file path
      - name: title
        type: str
        required: false
        default: "UNHCR Analysis"
      - name: author
        type: str
        required: false
        default: "UNHCR Statistics Copilot"
      - name: date
        type: str
        required: false
        default: null
      - name: include_code_cells
        type: bool
        required: false
        default: true
      - name: use_unhcr_theme
        type: bool
        required: false
        default: true
      - name: use_unhcr_style
        type: bool
        required: false
        default: true
      - name: original_query
        type: str
        required: false
        default: null
      - name: metadata
        type: dict
        required: false
        default: {}
      - name: data
        type: dict
        required: false
        default: {}

  # Generate Code Cells Task
  - name: generate_code_cells
    description: |
      Generate Python code cells for data analysis.
      This task creates executable Python code that can be
      embedded in Quarto notebooks for reproducibility.
    
    agent: notebook_generator
    expected_output: |
      A dictionary containing generated code:
      {
        'status': str,
        'python_code': str,
        'data_processing': str,
        'visualization_code': str
      }
    
    context:
      - data
      - analysis
      - visualization_structure
      - audience
      - document_type
    
    async_execution: false
    
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: visualization_structure
        type: dict
        required: false
        default: {}
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Export Notebook Task
  - name: export_notebook
    description: |
      Export Quarto notebook to multiple formats (HTML, PDF).
      This task renders the notebook to different output formats
      for distribution and sharing.
    
    agent: notebook_generator
    expected_output: |
      A dictionary containing export results:
      {
        'status': str,
        'html_path': str,
        'pdf_path': str,
        'export_log': list
      }
    
    context:
      - notebook_content
      - output_path
      - export_formats
    
    async_execution: true
    
    parameters:
      - name: notebook_content
        type: str
        required: true
        description: The Quarto notebook content
      - name: output_path
        type: str
        required: false
        default: null
        description: Base output path
      - name: export_formats
        type: list
        required: false
        default: [html, pdf]
        description: List of formats to export
