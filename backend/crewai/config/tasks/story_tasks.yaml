# UNHCR Statistics Copilot - Story Task Definitions
# This file defines story-related tasks using YAML for improved readability

tasks:
  # Generate Story Task
  - name: generate_story
    description: |
      Generate an analytical story from UNHCR data.
      This task uses the StoryGenerator agent to create
      comprehensive narratives based on data and analysis results.
    
    agent: story_generator
    expected_output: |
      A dictionary containing the generated story:
      {
        'status': str,
        'story_content': str,
        'title': str,
        'metadata': dict,
        'audience': str,
        'document_type': str
      }
    
    context:
      - data
      - result
      - question
      - audience
      - document_type
      - analysis_config
      - use_rag
    
    async_execution: true
    
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
        description: Data to use for story generation
      - name: result
        type: dict
        required: false
        default: {}
        description: Analysis results
      - name: question
        type: str
        required: true
        description: The analysis question
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
      - name: analysis_config
        type: dict
        required: false
        default: {}
        description: Configuration for analysis
      - name: use_rag
        type: bool
        required: false
        default: true
        description: Whether to use RAG enrichment

  # Generate Data Story Task
  - name: generate_data_story
    description: |
      Generate a data-driven story from UNHCR data.
      This task creates a complete narrative that includes
      data insights, trends, and key findings.
    
    agent: story_generator
    expected_output: |
      A dictionary containing the data story:
      {
        'status': str,
        'story': str,
        'key_findings': list,
        'data_insights': list,
        'trends': list,
        'metadata': dict
      }
    
    context:
      - data
      - question
      - audience
      - document_type
    
    async_execution: true
    
    parameters:
      - name: data
        type: dict
        required: true
        description: Data to generate story from
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Enrich Story with RAG Task
  - name: enrich_story_with_rag
    description: |
      Enrich a story with relevant context from UNHCR reports.
      This task uses the RAGResearcher agent to retrieve
      authoritative source material and integrate it into the story.
    
    agent: rag_researcher
    expected_output: |
      A dictionary containing enriched story:
      {
        'status': str,
        'enriched_story': str,
        'context_used': list,
        'sources': list,
        'rag_metadata': dict
      }
    
    context:
      - story_content
      - question
      - audience
      - document_type
    
    async_execution: true
    
    parameters:
      - name: story_content
        type: str
        required: true
        description: Story content to enrich
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Adapt Story for Audience Task
  - name: adapt_story_for_audience
    description: |
      Adapt a story for a specific audience and document type.
      This task uses the AudienceAdapter agent to ensure
      the story is appropriate for the target audience.
    
    agent: audience_adapter
    expected_output: |
      A dictionary containing adapted story:
      {
        'status': str,
        'adapted_story': str,
        'adaptations_made': list,
        'audience': str,
        'document_type': str
      }
    
    context:
      - story_content
      - audience
      - document_type
      - original_question
    
    async_execution: false
    
    parameters:
      - name: story_content
        type: str
        required: true
        description: Story content to adapt
      - name: audience
        type: str
        required: true
        description: Target audience
      - name: document_type
        type: str
        required: true
        description: Document type
      - name: original_question
        type: str
        required: false
        default: ""

  # Create Executive Summary Task
  - name: create_executive_summary
    description: |
      Create an executive summary from analysis results.
      This task generates a concise, high-level summary suitable
      for decision-makers and policy audiences.
    
    agent: story_generator
    expected_output: |
      A dictionary containing executive summary:
      {
        'status': str,
        'headline': str,
        'insight': str,
        'key_statistics': list,
        'impacts': list,
        'recommendations': list
      }
    
    context:
      - data
      - analysis
      - question
      - audience
      - document_type
    
    async_execution: true
    
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: policy_makers
      - name: document_type
        type: str
        required: false
        default: executive_summary

  # Create Technical Report Task
  - name: create_technical_report
    description: |
      Create a technical report from analysis results.
      This task generates a detailed, technical document suitable
      for analysts and technical audiences.
    
    agent: story_generator
    expected_output: |
      A dictionary containing technical report:
      {
        'status': str,
        'report_content': str,
        'methodology': str,
        'data_sources': list,
        'findings': list,
        'limitations': list
      }
    
    context:
      - data
      - analysis
      - statistics
      - question
      - audience
      - document_type
    
    async_execution: true
    
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: statistics
        type: dict
        required: false
        default: {}
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: analysts
      - name: document_type
        type: str
        required: false
        default: technical_report
