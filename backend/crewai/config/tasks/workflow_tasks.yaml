# UNHCR Statistics Copilot - Workflow Task Definitions
# This file defines workflow-related tasks using YAML for improved readability

tasks:
  # Full Analysis Workflow Task
  - name: full_analysis_workflow
    description: |
      Execute the complete analysis workflow from question to notebook.
      This is the primary end-to-end task that coordinates:
      1. Data fetching
      2. Statistical analysis
      3. Guardrails validation
      4. Story generation
      5. Notebook creation
    
    agent: analysis_orchestrator
    expected_output: |
      A comprehensive result containing:
      {
        'status': str,
        'data': dict,
        'analysis': dict,
        'guardrails': dict,
        'story': str,
        'notebook': dict,
        'visualizations': list,
        'metadata': dict,
        'warnings': list
      }
    
    context:
      - question
      - audience
      - document_type
      - use_rag
      - include_notebook
    
    async_execution: true
    
    parameters:
      - name: question
        type: str
        required: true
        description: The analysis question
      - name: audience
        type: str
        required: false
        default: internal
        description: Target audience
      - name: document_type
        type: str
        required: false
        default: technical_report
        description: Document type
      - name: use_rag
        type: bool
        required: false
        default: true
        description: Whether to use RAG enrichment
      - name: include_notebook
        type: bool
        required: false
        default: true
        description: Whether to create a Quarto notebook

  # Data to Story Workflow Task
  - name: data_to_story_workflow
    description: |
      Convert data directly to a story without full analysis.
      This workflow is optimized for cases where data is already
      available and just needs to be narrated.
    
    agent: story_generator
    expected_output: |
      A dictionary containing:
      {
        'status': str,
        'story_content': str,
        'metadata': dict,
        'data_summary': dict
      }
    
    context:
      - data
      - question
      - audience
      - document_type
      - use_rag
    
    async_execution: true
    
    parameters:
      - name: data
        type: dict
        required: true
        description: Input data
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
      - name: use_rag
        type: bool
        required: false
        default: true

  # Analysis to Notebook Workflow Task
  - name: analysis_to_notebook_workflow
    description: |
      Convert analysis results to a Quarto notebook.
      This workflow takes existing analysis and data to create
      a reproducible notebook.
    
    agent: notebook_generator
    expected_output: |
      A dictionary containing:
      {
        'status': str,
        'notebook_content': str,
        'notebook_path': str,
        'metadata': dict
      }
    
    context:
      - story_content
      - data
      - analysis
      - question
      - audience
      - document_type
      - output_path
    
    async_execution: false
    
    parameters:
      - name: story_content
        type: str
        required: true
        description: The story/narrative content
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
      - name: output_path
        type: str
        required: false
        default: null

  # Quick Analysis Workflow Task
  - name: quick_analysis_workflow
    description: |
      Perform a quick analysis with minimal steps.
      This workflow is optimized for speed and simplicity,
      sacrificing some depth for faster results.
    
    agent: analysis_orchestrator
    expected_output: |
      A dictionary containing:
      {
        'status': str,
        'analysis': dict,
        'story': str,
        'metadata': dict
      }
    
    context:
      - question
      - audience
      - document_type
    
    async_execution: true
    
    parameters:
      - name: question
        type: str
        required: true
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Comprehensive Analysis Workflow Task
  - name: comprehensive_analysis_workflow
    description: |
      Perform a comprehensive, in-depth analysis with all features.
      This workflow includes:
      - Full data fetching
      - Statistical analysis
      - Guardrails validation
      - RAG enrichment
      - Multiple visualizations
      - Detailed story
      - Quarto notebook with code
    
    agent: analysis_orchestrator
    expected_output: |
      A comprehensive result with all analysis outputs:
      {
        'status': str,
        'data': dict,
        'statistics': dict,
        'analysis': dict,
        'guardrails': dict,
        'rag_context': dict,
        'story': str,
        'visualizations': list,
        'notebook': dict,
        'metadata': dict,
        'warnings': list
      }
    
    context:
      - question
      - parameters
      - audience
      - document_type
    
    async_execution: true
    
    parameters:
      - name: question
        type: str
        required: true
      - name: parameters
        type: dict
        required: false
        default: {}
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: comprehensive_report

  # Batch Analysis Workflow Task
  - name: batch_analysis_workflow
    description: |
      Perform analysis on multiple questions or datasets in batch.
      This workflow processes multiple inputs sequentially
      and returns aggregated results.
    
    agent: analysis_orchestrator
    expected_output: |
      A dictionary containing:
      {
        'status': str,
        'results': list,
        'summary': dict,
        'batch_metadata': dict
      }
    
    context:
      - questions
      - audience
      - document_type
    
    async_execution: true
    
    parameters:
      - name: questions
        type: list
        required: true
        description: List of questions to analyze
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
