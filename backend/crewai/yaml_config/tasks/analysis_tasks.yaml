# UNHCR Statistics Copilot - Analysis Task Definitions
# This file defines analysis-related tasks using YAML for improved readability

tasks:
  # Analyze Statistics Task
  - name: analyze_statistics
    description: |
      Perform statistical analysis on UNHCR data.
      This task uses the StatisticalAnalyzer agent to calculate
      descriptive statistics, correlations, and distributions.
    
    agent: statistical_analyzer
    expected_output: |
      A dictionary with statistical analysis:
      {
        'status': str,
        'statistics': dict,
        'insights': list,
        'warnings': list,
        'data_summary': dict
      }
    
    context:
      - data
      - question
      - audience
      - document_type
    
    async_execution: false
    
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
        description: Data to analyze
      - name: question
        type: str
        required: false
        default: ""
        description: Analysis question
      - name: audience
        type: str
        required: false
        default: internal
        description: Target audience
      - name: document_type
        type: str
        required: false
        default: technical_report
        description: Document type

  # Validate Guardrails Task
  - name: validate_guardrails
    description: |
      Validate analysis against UNHCR methodology guardrails.
      This task uses the GuardrailsValidator agent to ensure
      analyses follow UNHCR standards and international guidelines.
    
    agent: guardrails_validator
    expected_output: |
      A dictionary with guardrails validation:
      {
        'status': str,
        'valid': bool,
        'violations': list,
        'warnings': list,
        'compliance_score': float
      }
    
    context:
      - data
      - analysis
      - question
      - audience
      - document_type
    
    async_execution: false
    depends_on: analyze_statistics
    
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Select Tools Task
  - name: select_tools
    description: |
      Select appropriate UNHCR data tools for a specific query.
      This task uses the ToolSelector agent to determine which
      tools should be used based on the question content.
    
    agent: tool_selector
    expected_output: |
      A dictionary with tool selection results:
      {
        'status': str,
        'selection': dict,
        'tool': str,
        'parameters': dict,
        'question': str
      }
    
    context:
      - question
      - audience
      - document_type
    
    async_execution: false
    
    parameters:
      - name: question
        type: str
        required: true
        description: The user's question
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Extract Visualization Task
  - name: extract_visualization
    description: |
      Extract visualization structure and metadata from data.
      This task uses the VisualizationExpert agent to create
      visualization structures and descriptions.
    
    agent: visualization_expert
    expected_output: |
      A dictionary with visualization structure:
      {
        'status': str,
        'structure': dict,
        'description': str,
        'visualization_type': str,
        'labels': dict
      }
    
    context:
      - data
      - visualization_type
      - audience
      - document_type
    
    async_execution: false
    
    parameters:
      - name: data
        type: dict
        required: true
        description: Data to visualize
      - name: visualization_type
        type: str
        required: false
        default: line_chart
        description: Type of visualization
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Generate Visualization Description Task
  - name: generate_visualization_description
    description: |
      Generate AI-powered descriptions for visualizations.
      This task uses the VisualizationExpert agent to create
      narrative descriptions of charts and graphs.
    
    agent: visualization_expert
    expected_output: |
      A dictionary with visualization descriptions:
      {
        'status': str,
        'description': str,
        'audience': str,
        'document_type': str
      }
    
    context:
      - data
      - analysis
      - visualization_structure
      - question
      - audience
      - document_type
    
    async_execution: true
    depends_on: extract_visualization
    
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: visualization_structure
        type: dict
        required: false
        default: {}
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # Full Analysis Pipeline Task
  - name: full_analysis_pipeline
    description: |
      Execute the complete analysis pipeline from question to results.
      This task coordinates multiple agents to perform end-to-end analysis:
      1. Data fetching (optional)
      2. Statistical analysis
      3. Guardrails validation
      4. Visualization extraction
      5. Description generation
    
    agent: analysis_orchestrator
    expected_output: |
      A comprehensive analysis result with:
      {
        'status': str,
        'analysis': dict,
        'guardrails': dict,
        'visualizations': list,
        'visualization_descriptions': dict,
        'warnings': list,
        'question': str,
        'audience': str,
        'document_type': str
      }
    
    context:
      - data
      - question
      - audience
      - document_type
      - use_rag
    
    async_execution: true
    
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
        description: Input data for analysis
      - name: question
        type: str
        required: true
        description: The analysis question
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
      - name: use_rag
        type: bool
        required: false
        default: true
        description: Whether to use RAG enrichment
