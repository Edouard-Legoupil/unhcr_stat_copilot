# Analysis Crew Configuration
# This crew handles statistical analysis, validation, and visualization of UNHCR data

name: analysis_crew

# Crew-level settings
process_type: sequential  # or parallel
verbose: 2
memory: true
cache: true
max_rpm: null
share_crew: true
crew_name: "AnalysisCrew_{audience}_{document_type}"
manager_llm: null

description: |
  Crew responsible for analyzing UNHCR data.
  This crew coordinates analysis agents to perform:
  - Statistical analysis of displacement data
  - Compliance validation against UNHCR guardrails
  - Visualization structure extraction
  - Visualization description generation

# Agent references (these will be loaded from the agents directory)
agents:
  - statistical_analyzer
  - guardrails_validator
  - tool_selector
  - visualization_expert

# Task workflow (optional - can be defined separately)
# Tasks will be created based on the workflow when the crew is instantiated
workflow:
  - name: analyze_data
    description: Perform comprehensive data analysis
    agent: statistical_analyzer
    expected_output: Statistical analysis results with metadata
    context:
      - question
      - parameters
      - audience
      - document_type
    async_execution: false
    
  - name: validate_guardrails
    description: Ensure analysis complies with UNHCR standards
    agent: guardrails_validator
    expected_output: Validation results with compliance information
    context:
      - data
      - analysis
      - question
      - audience
      - document_type
    depends_on: analyze_data
    async_execution: false
    
  - name: extract_visualization
    description: Extract visualization structure from analysis
    agent: visualization_expert
    expected_output: Visualization structure and metadata
    context:
      - data
      - analysis
      - question
      - audience
      - document_type
    depends_on: validate_guardrails
    async_execution: false
    
  - name: generate_visualization_description
    description: Generate descriptions for visualizations
    agent: visualization_expert
    expected_output: AI-powered visualization descriptions
    context:
      - data
      - analysis
      - visualization_structure
      - question
      - audience
      - document_type
    depends_on: extract_visualization
    async_execution: false
