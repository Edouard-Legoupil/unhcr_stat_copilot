# Story Crew Configuration
# This crew handles story generation for UNHCR data analysis

name: story_crew

# Crew-level settings
process_type: sequential
verbose: 2
memory: true
cache: true
max_rpm: null
share_crew: true
crew_name: "StoryCrew_{audience}_{document_type}"
manager_llm: null

description: |
  Crew responsible for generating analytical stories from UNHCR data.
  This crew coordinates story generation, enrichment, and adaptation
  for different audiences and document types.

# Agent references
agents:
  - story_generator
  - rag_researcher
  - audience_adapter
  - visualization_expert

# Default workflow for this crew
workflow:
  - name: generate_data_story
    description: Generate initial story from data
    agent: story_generator
    expected_output: Initial story content with key findings
    context:
      - data
      - question
      - audience
      - document_type
    async_execution: true
    
  - name: enrich_story_with_rag
    description: Enrich story with context from UNHCR reports
    agent: rag_researcher
    expected_output: Enriched story with additional context
    context:
      - story_content
      - question
      - audience
      - document_type
    depends_on: generate_data_story
    async_execution: true
    
  - name: adapt_story_for_audience
    description: Adapt story for specific audience
    agent: audience_adapter
    expected_output: Audience-adapted story
    context:
      - story_content
      - audience
      - document_type
      - original_question
    depends_on: enrich_story_with_rag
    async_execution: false
    
  - name: extract_visualization
    description: Extract visualization metadata from data
    agent: visualization_expert
    expected_output: Visualization structure for the story
    context:
      - data
      - analysis
      - story_content
      - audience
      - document_type
    depends_on: adapt_story_for_audience
    async_execution: false

# Alternative workflows
alternative_workflows:
  quick_story:
    - name: generate_data_story
      description: Generate story quickly without RAG
      agent: story_generator
      expected_output: Basic story content
      context:
        - data
        - question
        - audience
        - document_type
    
  executive_summary:
    - name: create_executive_summary
      description: Create executive summary
      agent: story_generator
      expected_output: Executive summary with key insights
      context:
        - data
        - analysis
        - question
        - audience
        - document_type
    
  technical_report:
    - name: create_technical_report
      description: Create technical report
      agent: story_generator
      expected_output: Technical report with methodology
      context:
        - data
        - analysis
        - statistics
        - question
        - audience
        - document_type

# Crew-specific configuration
story_settings:
  default_use_rag: true
  rag_top_k: 5
  rag_fetch_k: 20
  rag_rerank: false
  default_length: medium
  default_tone: formal
