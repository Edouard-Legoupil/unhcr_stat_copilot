# =============================================================================
# CREW DEFINITIONS
# =============================================================================

crews:
  
  # Main Analysis Crew - Simplified single crew for end-to-end analysis
  - name: main_analysis_crew
    description: |
      Main crew that performs end-to-end analysis from question to notebook.
      This simplified crew uses the analysis_orchestrator agent which coordinates
      all MCP tools directly, avoiding the complexity of multiple agent coordination.
      
      The workflow is:
      1. Fetch data using MCP tools
      2. Analyze data using MCP tools  
      3. Generate story using MCP tools
      4. Create notebook using MCP tools
      
      This minimizes token consumption and complexity while maintaining full functionality.
    
    # Crew settings
    process_type: sequential
    verbose: 2
    memory: true
    cache: true
    max_rpm: null
    share_crew: true
    crew_name: "UNHCRAnalysisCrew"
    manager_llm: null
    
    # Single orchestrator agent that uses MCP tools directly
    agents:
      - analysis_orchestrator
    
    # Workflow - tasks in execution order
    tasks:
      - fetch_and_validate_data
      - perform_statistical_analysis
      - validate_analysis_guardrails
      - generate_analytical_story
      - create_quarto_notebook
      - full_analysis_workflow
      - batch_analysis_workflow
    
    # Default workflow
    default_workflow: full_analysis_workflow
    
    # Orchestration settings
    orchestration:
      timeout: 300
      retry_attempts: 3
      error_handling: continue
