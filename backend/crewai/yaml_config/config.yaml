## =============================================================================
## UNHCR Statistics Copilot - Rebuilt YAML Aligned to Revised Mermaid Architecture
## =============================================================================

agents:

  # ---------------------------------------------------------------------------
  # DATA MANAGER
  # ---------------------------------------------------------------------------

  - name: unhcr_data_fetcher
    class_name: UNHCRDataFetcher
    module: backend.crewai.agents.data_fetchers
    role: data_manager
    goal: Retrieve UNHCR data from MCP-backed tools
    description: |
      Central agent for data retrieval operations.
      Handles population, RSD, and solutions data extraction from UNHCR sources.
    requires_api_client: true
    tools:
      - name: get_population_data
        source: backend.mcp.tools.get_population_data
        adapter: MCPToolAdapter.adapt_mcp_tool
        requires_api_client: true
        description: |
          Retrieve forcibly displaced population statistics from UNHCR.
          Use when asked about refugee numbers, asylum seekers,
          stateless persons, or other populations of concern by country and year.
        parameters:
          - coo
          - coa
          - year
          - coo_all
          - coa_all

      - name: get_rsd_applications
        source: backend.mcp.tools.get_rsd_applications
        adapter: MCPToolAdapter.adapt_mcp_tool
        requires_api_client: true
        description: |
          Retrieve Refugee Status Determination (RSD) application statistics.
          Use when asked about asylum applications, claims, or requests
          for refugee status by country, origin, or year.
        parameters:
          - coo
          - coa
          - year
          - coo_all
          - coa_all

      - name: get_rsd_decisions
        source: backend.mcp.tools.get_rsd_decisions
        adapter: MCPToolAdapter.adapt_mcp_tool
        requires_api_client: true
        description: |
          Retrieve Refugee Status Determination (RSD) decision outcomes.
          Use when asked about approved/rejected asylum cases,
          recognition rates, or refugee status determination results.
        parameters:
          - coo
          - coa
          - year
          - coo_all
          - coa_all

      - name: get_solutions
        source: backend.mcp.tools.get_solutions
        adapter: MCPToolAdapter.adapt_mcp_tool
        requires_api_client: true
        description: |
          Retrieve durable solutions data including refugee returnees,
          resettlement, naturalization, and IDP returns.
        parameters:
          - coo
          - coa
          - year
          - coo_all
          - coa_all

    capabilities:
      - population_data_retrieval
      - rsd_data_retrieval
      - solutions_data_retrieval
    methods:
      - fetch_population_data
      - fetch_rsd_data
      - fetch_solutions_data
      - fetch_all_data

  # ---------------------------------------------------------------------------
  # STATISTICAL ANALYST
  # ---------------------------------------------------------------------------

  - name: statistical_analyzer
    class_name: StatisticalAnalyzer
    module: backend.crewai.agents.analysts
    role: statistical_analyst
    goal: Analyze UNHCR data statistically and validate analysis logic
    description: |
      Specialist agent for statistical analysis and methodology validation.
      Performs descriptive statistics, correlations, distributions,
      and guardrails validation.
    tools:
      - name: analyze_data_statistics
        source: backend.mcp.tools.analyze_data_statistics
        adapter: MCPToolAdapter.adapt_mcp_tool
        description: |
          Perform statistical analysis on datasets including descriptive
          statistics, correlations, and distributions.
        parameters: []

      - name: apply_analysis_guardrails
        source: backend.mcp.tools.apply_analysis_guardrails
        adapter: MCPToolAdapter.adapt_mcp_tool
        description: |
          Apply UNHCR methodology guardrails to ensure analyses follow
          international standards.
        parameters: []

    capabilities:
      - statistical_analysis
      - data_insights
      - correlation_analysis
      - distribution_analysis
      - methodology_validation
      - compliance_checking
    methods:
      - analyze_statistics
      - validate_guardrails

  # ---------------------------------------------------------------------------
  # VISUALIZATION EXPERT
  # ---------------------------------------------------------------------------

  - name: visualization_expert
    class_name: VisualizationExpert
    module: backend.crewai.agents.analysts
    role: visualization_expert
    goal: Extract visualization metadata and generate descriptions
    description: |
      Specialist agent for visualization structure extraction and narrative generation.
    tools:
      - name: extract_visualization_structure
        source: backend.mcp.tools.extract_visualization_structure
        adapter: MCPToolAdapter.adapt_mcp_tool
        description: |
          Extract and structure visualization metadata for AI-generated reports.
        parameters: []

      - name: generate_visualization
        source: backend.mcp.tools.generate_visualization
        adapter: MCPToolAdapter.adapt_mcp_tool
        is_async: true
        description: |
          Generate AI-powered descriptions and interpretations for visualizations.
        parameters: []

    capabilities:
      - visualization_structure
      - description_generation
      - chart_metadata
    methods:
      - extract_visualization
      - generate_visualization

  # ---------------------------------------------------------------------------
  # STORY TELLER
  # ---------------------------------------------------------------------------

  - name: story_generator
    class_name: StoryGenerator
    module: backend.crewai.agents.story_generators
    role: story_teller
    goal: Generate analytical stories from UNHCR data
    description: |
      Specialist agent for creating analytical narratives and stories.
    tools:
      - name: generate_analytical_story
        source: backend.mcp.tools.generate_analytical_story
        adapter: MCPToolAdapter.adapt_mcp_tool
        description: |
          Generate analytical stories and narratives from UNHCR data.
        parameters:
          - result
          - data
          - question
          - audience
          - document_type
          - analysis_config
          - use_rag
          - rag_top_k
          - rag_fetch_k
          - rag_rerank
          - rag_year
          - rag_report_type
          - rag_section_contains
          - rag_exclude_figures_tables
          - context

      - name: get_data_for_story
        source: backend.mcp.tools.get_data_for_story
        adapter: MCPToolAdapter.adapt_mcp_tool
        description: |
          Get appropriate data for story generation based on question analysis.
        parameters:
          - question
          - coo
          - coa
          - year
          - years
          - population_types
          - coo_all
          - coa_all
          - audience
          - document_type
          - origin
          - destination
          - population_type
          - timespan

    capabilities:
      - story_generation
      - narrative_creation
      - data_driven_storytelling
      - audience_adaptation
    methods:
      - generate_story
      - create_data_story

  - name: rag_researcher
    class_name: RAGResearcher
    module: backend.crewai.agents.story_generators
    role: story_teller
    goal: Retrieve relevant context from UNHCR reports for enrichment
    description: |
      Specialist agent for retrieval-augmented generation (RAG).
    tools:
      - name: get_data_for_story
        source: backend.mcp.tools.get_data_for_story
        adapter: MCPToolAdapter.adapt_mcp_tool
        description: |
          Get appropriate data for story generation based on question analysis.
        parameters: []

    capabilities:
      - context_retrieval
      - document_search
      - information_enrichment
      - source_integration
    methods:
      - retrieve_context
      - enrich_story

  - name: audience_adapter
    class_name: AudienceAdapter
    module: backend.crewai.agents.story_generators
    role: story_teller
    goal: Adapt stories for specific audiences and document types
    description: |
      Specialist agent for audience-specific content adaptation.
    capabilities:
      - audience_adaptation
      - tone_adjustment
      - complexity_adjustment
      - format_customization
    methods:
      - adapt_for_audience
      - customize_for_document_type

  # ---------------------------------------------------------------------------
  # NOTEBOOK ENCODER
  # ---------------------------------------------------------------------------

  - name: notebook_generator
    class_name: NotebookGenerator
    module: backend.crewai.agents.orchestrators
    role: notebook_encoder
    goal: Generate Quarto notebooks from data stories
    description: |
      Specialist agent for Quarto notebook generation.
    tools:
      - name: create_quarto_notebook
        source: backend.mcp.tools.create_quarto_notebook
        adapter: MCPToolAdapter.adapt_mcp_tool
        description: |
          Create Quarto notebooks from data stories for reproducible reporting.
        parameters:
          - story_content
          - output_path
          - title
          - author
          - date
          - include_code_cells
          - use_unhcr_theme
          - use_unhcr_style
          - original_query
          - metadata
          - data

    capabilities:
      - notebook_generation
      - quarto_formatting
      - reproducible_output
      - template_management
    methods:
      - generate_notebook
      - create_quarto_notebook


tasks:

  # ---------------------------------------------------------------------------
  # DATA TASKS
  # ---------------------------------------------------------------------------

  - name: fetch_population_data
    description: |
      Fetch UNHCR population data for a given question and parameters.
    agent: unhcr_data_fetcher
    expected_output: |
      A dictionary containing population data with structure:
      {'status': str, 'data': dict, 'metadata': dict}
    context:
      - question
      - parameters
      - audience
      - document_type
    async_execution: false
    output_file: null
    parameters:
      - name: question
        type: str
        required: true
        description: The user's question
      - name: parameters
        type: dict
        required: true
        description: Data retrieval parameters (coo, coa, year, etc.)
      - name: audience
        type: str
        required: false
        default: internal
        description: Target audience for the analysis
      - name: document_type
        type: str
        required: false
        default: technical_report
        description: Document type for the analysis

  - name: fetch_rsd_data
    description: |
      Fetch Refugee Status Determination data including applications and decisions.
    agent: unhcr_data_fetcher
    expected_output: |
      A dictionary containing RSD data:
      {
        'status': str,
        'rsd_applications': dict,
        'rsd_decisions': dict
      }
    context:
      - question
      - parameters
      - audience
      - document_type
    async_execution: false
    parameters:
      - name: question
        type: str
        required: true
      - name: parameters
        type: dict
        required: false
        default: {}
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  - name: fetch_solutions_data
    description: |
      Fetch durable solutions data including refugee returnees,
      resettlement, naturalization, and IDP returns.
    agent: unhcr_data_fetcher
    expected_output: |
      A dictionary containing solutions data:
      {'status': str, 'solutions': dict}
    context:
      - question
      - parameters
      - audience
      - document_type
    async_execution: false
    parameters:
      - name: question
        type: str
        required: true
      - name: parameters
        type: dict
        required: false
        default: {}
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # ---------------------------------------------------------------------------
  # ANALYSIS TASKS
  # ---------------------------------------------------------------------------

  - name: analyze_statistics
    description: |
      Perform statistical analysis on UNHCR data.
    agent: statistical_analyzer
    expected_output: |
      A dictionary with statistical analysis:
      {
        'status': str,
        'statistics': dict,
        'insights': list,
        'warnings': list,
        'data_summary': dict
      }
    context:
      - data
      - question
      - audience
      - document_type
    async_execution: false
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
        description: Data to analyze
      - name: question
        type: str
        required: false
        default: ""
        description: Analysis question
      - name: audience
        type: str
        required: false
        default: internal
        description: Target audience
      - name: document_type
        type: str
        required: false
        default: technical_report
        description: Document type

  - name: validate_guardrails
    description: |
      Validate analysis against UNHCR methodology guardrails.
    agent: statistical_analyzer
    expected_output: |
      A dictionary with guardrails validation:
      {
        'status': str,
        'valid': bool,
        'violations': list,
        'warnings': list,
        'compliance_score': float
      }
    context:
      - data
      - analysis
      - question
      - audience
      - document_type
    async_execution: false
    depends_on: analyze_statistics
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # ---------------------------------------------------------------------------
  # VISUALIZATION TASKS
  # ---------------------------------------------------------------------------

  - name: extract_visualization
    description: |
      Extract visualization structure and metadata from data.
    agent: visualization_expert
    expected_output: |
      A dictionary with visualization structure:
      {
        'status': str,
        'structure': dict,
        'description': str,
        'visualization_type': str,
        'labels': dict
      }
    context:
      - data
      - visualization_type
      - audience
      - document_type
    async_execution: false
    parameters:
      - name: data
        type: dict
        required: true
        description: Data to visualize
      - name: visualization_type
        type: str
        required: false
        default: line_chart
        description: Type of visualization
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  - name: generate_visualization
    description: |
      Generate AI-powered descriptions for visualizations.
    agent: visualization_expert
    expected_output: |
      A dictionary with visualization descriptions:
      {
        'status': str,
        'description': str,
        'audience': str,
        'document_type': str
      }
    context:
      - data
      - analysis
      - visualization_structure
      - question
      - audience
      - document_type
    async_execution: true
    depends_on: extract_visualization
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: visualization_structure
        type: dict
        required: false
        default: {}
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # ---------------------------------------------------------------------------
  # STORY TASKS
  # ---------------------------------------------------------------------------

  - name: generate_story
    description: |
      Generate an analytical story from UNHCR data.
    agent: story_generator
    expected_output: |
      A dictionary containing the generated story:
      {
        'status': str,
        'story_content': str,
        'title': str,
        'metadata': dict,
        'audience': str,
        'document_type': str
      }
    context:
      - data
      - result
      - question
      - audience
      - document_type
      - analysis_config
      - use_rag
    async_execution: true
    parameters:
      - name: data
        type: dict
        required: false
        default: {}
        description: Data to use for story generation
      - name: result
        type: dict
        required: false
        default: {}
        description: Analysis results
      - name: question
        type: str
        required: true
        description: The analysis question
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
      - name: analysis_config
        type: dict
        required: false
        default: {}
      - name: use_rag
        type: bool
        required: false
        default: true

  - name: enrich_story_with_rag
    description: |
      Enrich a story with relevant context from UNHCR reports.
    agent: rag_researcher
    expected_output: |
      A dictionary containing enriched story:
      {
        'status': str,
        'enriched_story': str,
        'context_used': list,
        'sources': list,
        'rag_metadata': dict
      }
    context:
      - story_content
      - question
      - audience
      - document_type
    async_execution: true
    parameters:
      - name: story_content
        type: str
        required: true
        description: Story content to enrich
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  - name: adapt_story_for_audience
    description: |
      Adapt a story for a specific audience and document type.
    agent: audience_adapter
    expected_output: |
      A dictionary containing adapted story:
      {
        'status': str,
        'adapted_story': str,
        'adaptations_made': list,
        'audience': str,
        'document_type': str
      }
    context:
      - story_content
      - audience
      - document_type
      - original_question
    async_execution: false
    parameters:
      - name: story_content
        type: str
        required: true
        description: Story content to adapt
      - name: audience
        type: str
        required: true
        description: Target audience
      - name: document_type
        type: str
        required: true
        description: Document type
      - name: original_question
        type: str
        required: false
        default: ""

  # ---------------------------------------------------------------------------
  # NOTEBOOK TASKS
  # ---------------------------------------------------------------------------

  - name: create_notebook
    description: |
      Create a Quarto notebook from analysis results.
    agent: notebook_generator
    expected_output: |
      A dictionary containing the notebook:
      {
        'status': str,
        'notebook_content': str,
        'metadata': dict,
        'path': str
      }
    context:
      - story_content
      - data
      - analysis
      - question
      - output_path
      - audience
      - document_type
    async_execution: false
    parameters:
      - name: story_content
        type: str
        required: false
        default: ""
        description: The story/narrative content
      - name: data
        type: dict
        required: false
        default: {}
        description: Data used in analysis
      - name: analysis
        type: dict
        required: false
        default: {}
        description: Analysis results
      - name: question
        type: str
        required: false
        default: ""
        description: Original question
      - name: output_path
        type: str
        required: false
        default: null
        description: Output file path
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report

  # ---------------------------------------------------------------------------
  # WORKFLOW / ORCHESTRATION TASKS
  # ---------------------------------------------------------------------------

  - name: full_analysis_workflow
    description: |
      Execute the complete analysis workflow from question to notebook.
    agent: analysis_orchestrator
    expected_output: |
      A comprehensive result containing:
      {
        'status': str,
        'data': dict,
        'analysis': dict,
        'guardrails': dict,
        'story': str,
        'notebook': dict,
        'visualizations': list,
        'metadata': dict,
        'warnings': list
      }
    context:
      - question
      - audience
      - document_type
      - use_rag
      - include_notebook
    async_execution: true
    parameters:
      - name: question
        type: str
        required: true
        description: The analysis question
      - name: audience
        type: str
        required: false
        default: internal
        description: Target audience
      - name: document_type
        type: str
        required: false
        default: technical_report
        description: Document type
      - name: use_rag
        type: bool
        required: false
        default: true
        description: Whether to use RAG enrichment
      - name: include_notebook
        type: bool
        required: false
        default: true
        description: Whether to create a Quarto notebook

  - name: data_to_story_workflow
    description: |
      Convert data directly to a story without full analysis.
    agent: story_generator
    expected_output: |
      A dictionary containing:
      {
        'status': str,
        'story_content': str,
        'metadata': dict,
        'data_summary': dict
      }
    context:
      - data
      - question
      - audience
      - document_type
      - use_rag
    async_execution: true
    parameters:
      - name: data
        type: dict
        required: true
        description: Input data
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
      - name: use_rag
        type: bool
        required: false
        default: true

  - name: analysis_to_notebook_workflow
    description: |
      Convert analysis results to a Quarto notebook.
    agent: notebook_generator
    expected_output: |
      A dictionary containing:
      {
        'status': str,
        'notebook_content': str,
        'notebook_path': str,
        'metadata': dict
      }
    context:
      - story_content
      - data
      - analysis
      - question
      - audience
      - document_type
      - output_path
    async_execution: false
    parameters:
      - name: story_content
        type: str
        required: true
        description: The story/narrative content
      - name: data
        type: dict
        required: false
        default: {}
      - name: analysis
        type: dict
        required: false
        default: {}
      - name: question
        type: str
        required: false
        default: ""
      - name: audience
        type: str
        required: false
        default: internal
      - name: document_type
        type: str
        required: false
        default: technical_report
      - name: output_path
        type: str
        required: false
        default: null

crews:

  - name: main_analysis_crew
    description: |
      Main crew that performs end-to-end analysis from question to notebook.
      This simplified crew uses the analysis_orchestrator agent which coordinates
      all MCP tools directly.
    process_type: sequential
    verbose: 2
    memory: true
    cache: true
    max_rpm: null
    share_crew: true
    crew_name: "UNHCRAnalysisCrew"
    manager_llm: null
    agents:
      - analysis_orchestrator
    tasks:
      - fetch_and_validate_data
      - perform_statistical_analysis
      - validate_analysis_guardrails
      - generate_analytical_story
      - create_quarto_notebook
      - full_analysis_workflow
      - batch_analysis_workflow
    default_workflow: full_analysis_workflow
    orchestration:
      timeout: 300
      retry_attempts: 3
      error_handling: continue